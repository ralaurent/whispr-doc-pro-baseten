name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Vitest Integration Tests
      run: npm run test:integration
      
    - name: Run Promptfoo Evals
      run: npx promptfoo@latest eval
      env:
        OPENROUTER_KEY_1: ${{ secrets.OPENROUTER_KEY_1 }}
