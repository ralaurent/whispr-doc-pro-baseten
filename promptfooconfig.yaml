  # ── Stage 2: Transcript → Structured JSON Extraction ──────────────────────
  - vars:
      transcript: file://evals/expected/transcript/chinese.txt
      schema: file://evals/schema/w9.json
      expected_output: file://evals/expected/transcript/w9.json
    prompt: file://evals/transcript-prompt.txt
    assert:
      - type: llm-rubric
        value: |
          You are an expert evaluation judge for multilingual transcript data extraction.
          Rate the actual JSON output against the expected ground truth JSON extracted from a spoken transcript.

          STRICT RULES (these must match exactly):
          - Boolean fields (true/false) must be exactly correct.
          - String identifiers like SSN parts (ssn_part_1, ssn_part_2, ssn_part_3), EIN parts, exempt codes must match exactly.
          - Null fields should be null in both.

          LENIENT RULES (be forgiving here):
          - Address and location fields: accept if the same location is represented, even if word order differs slightly or abbreviations are used.
          - Name fields: accept minor transliteration differences for non-Latin names.
          - City/state/zip: accept if the correct city, state, and zip are present even if formatting differs.

          EVALUATION STEPS:
          1. Check all boolean fields — must be exact.
          2. Check all identifier/code fields (SSN, EIN, codes) — must be exact.
          3. Check address/location fields leniently — same location counts as correct.
          4. Penalize only for clearly wrong or missing factual data.

          Expected Ground Truth JSON:
          {{expected_output}}

  - vars:
      transcript: file://evals/expected/transcript/spanish.txt
      schema: file://evals/schema/w4.json
      expected_output: file://evals/expected/transcript/w4.json
    prompt: file://evals/transcript-prompt.txt
    assert:
      - type: llm-rubric
        value: |
          You are an expert evaluation judge for multilingual transcript data extraction.
          Rate the actual JSON output against the expected ground truth JSON extracted from a spoken transcript.

          STRICT RULES (these must match exactly):
          - Boolean fields (true/false) must be exactly correct.
          - SSN format must be XXX-XX-XXXX and match the expected value.
          - EIN format must be XX-XXXXXXX and match the expected value.
          - Date format must be YYYY-MM-DD (e.g. 2023-03-12) and match the expected value.
          - Null fields should be null in both.

          LENIENT RULES (be forgiving here):
          - Address and location fields: accept if the same location is represented, even if word order differs slightly, or Spanish/English place names are used interchangeably (e.g. "Spain" vs "España", "Aragon" vs "Aragón").
          - Name fields: accept minor accent or capitalization differences.
          - City/state/zip: accept if the correct city, region, and postal code are present even if formatting differs.

          EVALUATION STEPS:
          1. Check all boolean fields — must be exact.
          2. Check SSN, EIN, and date fields — must match the correct formatted value.
          3. Check address/location fields leniently — same location counts as correct.
          4. Penalize only for clearly wrong or missing factual data.

          Expected Ground Truth JSON:
          {{expected_output}}
